name: macOS Build
on:
  push:
    tags:
      - 'v*'   # run only on tags like v1.2.3

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      BUILD_TYPE: Release
      APP_NAME: standard_of_iron
      APP_DIR: build/bin
      QML_DIR: ui/qml
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: brew install ninja
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'mac'
          arch: 'clang_64'
          cache: true
          modules: 'qt5compat qtmultimedia'
      - name: Configure
        # clang_64 is the x86_64 Qt variant; target x86_64 explicitly so that
        # the build is consistent on both Intel and Apple Silicon runners.
        # The resulting binary runs on Apple Silicon via Rosetta 2.
        run: cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=${BUILD_TYPE} -DDEFAULT_LANG=en -DCMAKE_OSX_ARCHITECTURES=x86_64
      - name: Build
        run: cmake --build build --config ${BUILD_TYPE}
      - name: Validate OpenGL requirements
        run: python3 scripts/validate_opengl_requirements.py
      - name: Deploy Qt (macdeployqt)
        run: |
          macdeployqt "${APP_DIR}/${APP_NAME}.app" -qmldir="${QML_DIR}" -verbose=1
      - name: Copy assets into .app bundle
        run: |
          # Place assets in Contents/Resources/assets/ (standard macOS bundle location)
          mkdir -p "${APP_DIR}/${APP_NAME}.app/Contents/Resources/assets"
          rsync -a assets/ "${APP_DIR}/${APP_NAME}.app/Contents/Resources/assets/"
      - name: Verify packaged gameplay renderer
        run: |
          set -o pipefail
          "${APP_DIR}/${APP_NAME}.app/Contents/MacOS/${APP_NAME}" \
            --renderer-self-test 2>&1 | tee renderer_self_test.log
          grep -q "SOI_RENDERER_SELF_TEST: PASS" renderer_self_test.log
      - name: Create DMG
        run: |
          hdiutil create -volname "Standard of Iron" -srcfolder "${APP_DIR}/${APP_NAME}.app" -ov -format UDZO "standard_of_iron-macos.dmg"
      - name: Sign and Notarize (optional)
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ./scripts/sign-and-notarize-macos.sh "${APP_DIR}/${APP_NAME}.app" "standard_of_iron-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ env.BUILD_TYPE }}
          path: standard_of_iron-macos.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: standard_of_iron-macos.dmg
