name: Linux Build
on:
  push:
    tags:
      - 'v*'   # run only on tags like v1.2.3

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      BUILD_TYPE: Release
      APP_NAME: standard_of_iron
      APP_DIR: build/bin
    steps:
      - uses: actions/checkout@v4

      # Qt (use either apt or install-qt-action; action ensures consistent Qt)
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'linux'
          arch: 'gcc_64'
          cache: true
          modules: 'qt5compat qtmultimedia'

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build patchelf file rsync xvfb

      - name: Build
        run: ./scripts/build-linux.sh ${BUILD_TYPE} en

      - name: Validate OpenGL requirements
        run: python3 scripts/validate_opengl_requirements.py

      - name: Package AppImage
        run: ./scripts/package-appimage.sh ${APP_NAME} ${APP_DIR} ui/qml

      - name: Smoke-test OpenGL 3.3 Core (Mesa software renderer)
        run: |
          APPIMAGE=$(ls ./*.AppImage | head -1)
          chmod +x "$APPIMAGE"

          # LIBGL_ALWAYS_SOFTWARE=1 forces Mesa's llvmpipe, which supports
          # OpenGL 4.5 Core Profile -- a superset of the 3.3 Core the game
          # requires.  This validates the full GL init path without a GPU.
          export LIBGL_ALWAYS_SOFTWARE=1
          export QT_OPENGL=desktop
          export QT_LOGGING_RULES="qt.rhi.*=false"

          echo "=== Running AppImage smoke test (15 s timeout) ==="
          timeout 15 xvfb-run --auto-servernum -- "$APPIMAGE" \
            > smoke_out.txt 2>&1 || true

          echo "=== Startup log (last 50 lines) ==="
          tail -50 smoke_out.txt || true

          # Best case: GL backend fully initialized.
          if grep -q "Backend::initialize() - Complete!" smoke_out.txt; then
            echo "✓ OpenGL 3.3 Core backend initialized (Mesa software renderer)"
            exit 0
          fi

          # Acceptable: app reached QGuiApplication (GL init runs on the
          # render thread and may need more time on a loaded CI machine).
          if grep -q "QGuiApplication created successfully" smoke_out.txt; then
            echo "✓ Application started; QGuiApplication initialized"
            echo "  (GL backend init may need an interactive display for full verification)"
            exit 0
          fi

          # Hard failure: explicit backend init failure logged.
          if grep -q "FAILED: QOpenGLFunctions_3_3_Core" smoke_out.txt; then
            echo "✗ OpenGL 3.3 Core Profile not supported by this renderer"
            cat smoke_out.txt
            exit 1
          fi

          echo "✗ No expected startup markers found -- possible crash or deployment issue"
          cat smoke_out.txt
          exit 1

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ env.BUILD_TYPE }}
          path: ./*.AppImage

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: '*.AppImage'
