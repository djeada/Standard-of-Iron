name: Linux Build
on:
  push:
    tags:
      - 'v*'   # run only on tags like v1.2.3

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    env:
      BUILD_TYPE: Release
      APP_NAME: standard_of_iron
      APP_DIR: build/bin
    steps:
      - uses: actions/checkout@v4

      # Qt (use either apt or install-qt-action; action ensures consistent Qt)
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'linux'
          arch: 'gcc_64'
          cache: true
          modules: 'qt5compat qtmultimedia'

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build patchelf file rsync xvfb

      - name: Build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DDEFAULT_LANG=en
          cmake --build build --config ${BUILD_TYPE}

      - name: Validate OpenGL requirements
        run: python3 scripts/validate_opengl_requirements.py

      - name: Package AppImage
        run: ./scripts/package-appimage.sh ${APP_NAME} ${APP_DIR} ui/qml

      - name: Verify packaged gameplay renderer (Mesa software OpenGL)
        run: |
          set -o pipefail
          APPIMAGE=$(ls ./*.AppImage | head -1)
          chmod +x "$APPIMAGE"

          # LIBGL_ALWAYS_SOFTWARE=1 forces Mesa's llvmpipe, which supports
          # OpenGL 4.5 Core Profile -- a superset of the 3.3 Core the game
          # requires.  This validates the full GL init path without a GPU.
          export LIBGL_ALWAYS_SOFTWARE=1
          export QT_OPENGL=desktop
          export QT_LOGGING_RULES="qt.rhi.*=false"

          xvfb-run --auto-servernum -- "$APPIMAGE" --renderer-self-test \
            2>&1 | tee renderer_self_test.log
          grep -q "SOI_RENDERER_SELF_TEST: PASS" renderer_self_test.log

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ env.BUILD_TYPE }}
          path: ./*.AppImage

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: '*.AppImage'
